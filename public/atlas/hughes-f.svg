<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <!-- Hughes fragment — behavior map / decision pathway. Signal → baseline →
       deviation → action, annotated like a field protocol. Dossier instrument
       grammar: matte dark ground, bone ink, mono micro-labels. -->
  <rect width="800" height="800" fill="#171511"/>
  <!-- baseline track -->
  <g stroke="#E8E0CF" fill="none">
    <line x1="90" y1="400" x2="710" y2="400" stroke-opacity="0.16" stroke-width="1"/>
    <!-- signal trace: baseline → spike (deviation) → resolve -->
    <path d="M 90 400 L 250 400 L 292 396 L 330 402 L 368 322 L 398 470 L 428 356 L 462 412 L 540 402 L 710 400"
          stroke-opacity="0.6" stroke-width="1.5"/>
    <!-- deviation window -->
    <rect x="350" y="300" width="130" height="196" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="3 3"/>
    <!-- decision branch -->
    <path d="M 480 400 L 588 330" stroke-opacity="0.45" stroke-width="1"/>
    <path d="M 480 400 L 588 470" stroke-opacity="0.45" stroke-width="1" stroke-dasharray="2 3"/>
  </g>
  <!-- nodes -->
  <g fill="#E8E0CF">
    <circle cx="250" cy="400" r="4" fill-opacity="0.55"/>
    <circle cx="480" cy="400" r="6" fill-opacity="0.9"/>
    <circle cx="588" cy="330" r="4" fill-opacity="0.7"/>
    <circle cx="588" cy="470" r="4" fill-opacity="0.4"/>
  </g>
  <circle cx="480" cy="400" r="13" fill="none" stroke="#E8E0CF" stroke-opacity="0.5" stroke-width="0.75" stroke-dasharray="2 2"/>
  <!-- annotation ticks -->
  <g stroke="#E8E0CF" stroke-opacity="0.3" stroke-width="1">
    <line x1="250" y1="412" x2="250" y2="430"/>
    <line x1="415" y1="496" x2="415" y2="514"/>
    <line x1="480" y1="412" x2="480" y2="430"/>
  </g>
  <!-- labels -->
  <g fill="#E8E0CF" font-family="ui-monospace, monospace" font-size="13" letter-spacing="2">
    <text x="90" y="378" fill-opacity="0.35">BASELINE</text>
    <text x="352" y="290" fill-opacity="0.45">DEVIATION</text>
    <text x="470" y="448" fill-opacity="0.55">DECIDE</text>
    <text x="604" y="334" fill-opacity="0.5">ADOPT</text>
    <text x="604" y="474" fill-opacity="0.3">REJECT</text>
    <text x="90" y="66" fill-opacity="0.35">FIG. B-07</text>
    <text x="90" y="712" fill-opacity="0.35">SIGNAL / RESPONSE</text>
  </g>
  <!-- measurement furniture -->
  <g stroke="#E8E0CF" stroke-opacity="0.25" stroke-width="1">
    <line x1="460" y1="740" x2="460" y2="726"/>
    <line x1="585" y1="740" x2="585" y2="730"/>
    <line x1="710" y1="740" x2="710" y2="726"/>
    <line x1="460" y1="733" x2="710" y2="733"/>
  </g>
</svg>
