ore it's load-bearing, rather than patching after. His domain is startup timing, not visual remediation — the fit is in the shape of the reasoning.", "rank": 29}, "Webster": {"name": "Webster", "group": "vanguard", "bio": "Head of UX, Google Labs. Incubating experimental human-computer interaction technologies.", "rationale": "HIGH-VELOCITY — near the craft/AI crossing point, ephemeral leaning.", "distance": 0.618, "quadrant": "HIGH-VELOCITY", "doctrineFit": "“My career has been about the pursuit of human machine soul energy, still is” — a phrase inherited from his mentor Kenji Ekuan, carried for a whole career (TechStuff/iHeart podcast, Jul 2025). A genuine echo of ai-spirit-brand's “a core pulse of rhythm and discipline allows for infinite expression.” His point that “most humans are at their best when there's a little bit of delightful struggle going on” also lands close to cw14 — choosing friction on purpose, not removing it by default.", "rank": 24}, "South": {"name": "South", "group": "vanguard", "bio": "Co-founder / CEO, Variant. A “Designer-CEO” using service-design experience to architect new ventures.", "rationale": "CULTURAL — craft-native leaning, ephemeral leaning.", "distance": 0.753, "quadrant": "CULTURAL", "gap": "Weakest sourcing of all 28 — a single unverifiable partial tweet, and one widely-surfaced quote actively traced to a different person (Alex Kehr, not South) and excluded before it could be misattributed here. No clean mapping; recorded honestly rather than padded.", "rank": 31}, "Kalu": {"name": "Kalu", "group": "artist", "bio": "Sculptor / installation artist. Wraps dead media — VHS tape, cling film, rope — into massive bundles, finished on-site in physical dialogue with the room.", "rationale": "HERITAGE CRAFT — craft-native leaning, strongly durable.", "distance": 0.76, "quadrant": "HERITAGE CRAFT", "doctrineFit": "Maps to register-vanitas and t1-absence-material — she builds with a dead medium's literal corpse (defunct VHS tape), not ju const RANKED = Object.values(PEOPLE).sort((a,b) => a.rank - b.rank);

function selectDot(name) {
  document.querySelectorAll('.pt.active').forEach(a=>a.classList.remove('active'));
  const el = document.querySelector(`.pt[data-name="${CSS.escape(name)}"]`);
  if (el) el.classList.add('active');
}

function renderList() {
  document.querySelectorAll('.pt.active').forEach(a=>a.classList.remove('active'));
  let rows = RANKED.map(p => `
    <li data-name="${p.name}"><span class="nm">${p.name}</span><span class="ds">${p.distance.toFixed(3)}</span></li>
  `).join('');
  const html = `
    <div class="listhead">NEAREST TO ME, BY AXIS DISTANCE</div>
    <div class="listnote">Open a name for its positioning rationale. Doctrine-fit notes cite internal doctrine-corpus nodes (e.g. <em>method-single-source</em>, <em>HD-04</em>).</div>
    <ol class="ranking">
      <li class="me-marker"><span class="nm">ME</span><span class="ds">0.000</span></li>
      ${rows}
    </ol>
  `;
  document.getElementById('panel-inner').innerHTML = html;
  document.querySelectorAll('#panel ol.ranking li[data-name]').forEach(li => {
    li.addEventListener('click', () => { selectDot(li.getAttribute('data-name')); renderDetail(li.getAttribute('data-name')); });
  });
}

function renderDetail(name) {
  const p = PEOPLE[name];
  if (!p) return;
  selectDot(name);
  const groupLabel = {orig:"Creative Visionaries", vanguard:"AI Vanguard", artist:"Fine Artist"}[p.group] || p.group;
  let html = `
    <div class="back" id="backlink">← back to ranked list</div>
    <div class="rank">#${p.rank}</div>
    <div class="eyebrow">${groupLabel.toUpperCase()} · ${p.quadrant}</div>
    <h1>${p.name}</h1>
    <div class="role">${p.bio}</div>
    <div class="rationale">${p.rationale}</div>
    <div class="row"><span>DISTANCE FROM ME</span><span>${p.distance.toFixed(3)}</span></div>
    <div class="row"><span>RANK (NEAREST=1)</span><span>${p.rank} of 32</span></div>
  `;
  if (p.doctrineFit) {
    const tag = p.group === "artist" ? 'DOCTRINE-FIT — SEE "THE FOUR MIRRORS"' : 'DOCTRINE-FIT — RESEARCHED, OWN WORDS';
    html += `<div class="doctrine"><div class="tag">${tag}</div>${p.doctrineFit}</div>`;
  }
  if (p.gap) {
    html += `<div class="doctrine gapnote"><div class="tag gaptag">NO CLEAN MAPPING FOUND</div>${p.gap}</div>`;
  }
  document.getElementById('panel-inner').innerHTML = html;
  document.getElementById('backlink').addEventListener('click', renderList);
}

document.querySelectorAll('.pt').forEach(el => {
  const name = el.getAttribute('data-name');
  el.addEventListener('mouseenter', () => renderDetail(name));
  el.addEventListener('click', () => renderDetail(name));
  el.addEventListener('focus', () => renderDetail(name));
});

// __NPM_LAYOUT_START__  (pure; extracted verbatim by scratchpad/audit.mjs — keep DOM-free)
function computeLayout(dots, ME, XB, YB, RECT){
  var qx=function(q){return (q==='HIGH-VELOCITY'||q==='DOCTRINE-LED AI')?1:-1;}; // AI  => x>XB
  var qy=function(q){return (q==='DOCTRINE-LED AI'||q==='HERITAGE CRAFT')?1:-1;}; // DURABLE => y>YB
  var info=dots.map(function(t){
    var c=Math.cos(t.ang), s=Math.sin(t.ang);
    // rMax so the point stays inside the plot rect (with label margin)
    var rb=[];
    if(c>1e-6) rb.push((RECT.xmax-ME.x)/c); if(c<-1e-6) rb.push((RECT.xmin-ME.x)/c);
    if(s>1e-6) rb.push((RECT.ymax-ME.y)/s); if(s<-1e-6) rb.push((RECT.ymin-ME.y)/s);
    var rMax=Math.min.apply(null, rb.filter(function(v){return v>0;}));
    var rMin=0, sx=qx(t.q), sy=qy(t.q);
    // Quadrant membership is inviolable: constrain r so the dot lands on the
    // correct side of BOTH axis lines (the cross is NOT centered on ME, so a
    // pure radial rescale could otherwise cross into a wrong quadrant).
    function apply(sideSign, base, coef){
      if(Math.abs(coef)<1e-9){ if(sideSign*base<=0) rMax=-1; return; }
      var r0=-base/coef, growPos=sideSign*coef>0;
      if(growPos) rMin=Math.max(rMin,r0); else rMax=Math.min(rMax,r0);
    }
    apply(sx, ME.x-XB, c);
    apply(sy, ME.y-YB, s);
    return {name:t.name, ang:t.ang, d:t.d, rMin:Math.max(0,rMin), rMax:rMax};
  });
  // Largest single SCALE keeping every dot inside its rMax; widen toward the
  // lower bound (dots that must clear a boundary) so no clamp is needed when a
  // feasible window exists. Radius = distance*SCALE => plotted distance is
  // proportional to the measured distance field, by construction.
  var upper=Math.min.apply(null, info.map(function(o){return o.rMax/o.d;}));
  var lowNeeds=info.filter(function(o){return o.rMin>0;}).map(function(o){return o.rMin/o.d;});
  var lower=lowNeeds.length?Math.max.apply(null,lowNeeds):0;
  var feasible=lower<=upper;
  var SCALE=feasible?(lower+upper)/2:upper;
  var laid=info.map(function(o){
    var r=o.d*SCALE, clamped=null;
    if(r>o.rMax){ r=o.rMax; clamped='max'; }
    if(r<o.rMin){ r=o.rMin; clamped='min'; }
    return {name:o.name, r:r, clamped:clamped, x:ME.x+r*Math.cos(o.ang), y:ME.y+r*Math.sin(o.ang)};
  });
  return {SCALE:SCALE, feasible:feasible, laid:laid};
}
// __NPM_LAYOUT_END__

// Bind each dot's radius-from-ME to its measured `distance` (self-verifying:
// re-derives every load, so plotted distance can never drift from the data).
// Bearing/quadrant come from the authored markup; only the radius is computed.
function layoutDots(){
  var ME={x:906,y:788}, XB=600, YB=560, RECT={xmin:64,xmax:1120,ymin:150,ymax:986};
  var nodes=Array.prototype.slice.call(document.querySelectorAll('.pt[data-name]'));
  var dots=nodes.map(function(el){
    var name=el.getAttribute('data-name'), dot=el.querySelector('.dot');
    var ox=+dot.getAttribute('cx'), oy=+dot.getAttribute('cy');
    return {name:name, ang:Math.atan2(oy-ME.y, ox-ME.x), d:PEOPLE[name].distance, q:PEOPLE[name].quadrant};
  });
  var out=computeLayout(dots, ME, XB, YB, RECT);
  var byName={}; out.laid.forEach(function(o){ byName[o.name]=o; });
  nodes.forEach(function(el){
    var name=el.getAttribute('data-name'), o=byName[name]; if(!o) return;
    var dot=el.querySelector('.dot'), hit=el.querySelector('.hit'), lbl=el.querySelector('.lbl');
    var odx=(+lbl.getAttribute('x'))-(+dot.getAttribute('cx'));
    var ody=(+lbl.getAttribute('y'))-(+dot.getAttribute('cy'));
    dot.setAttribute('cx', o.x.toFixed(1)); dot.setAttribute('cy', o.y.toFixed(1));
    hit.setAttribute('cx', o.x.toFixed(1)); hit.setAttribute('cy', o.y.toFixed(1));
    lbl.setAttribute('x', (o.x+odx).toFixed(1)); lbl.setAttribute('y', (o.y+ody).toFixed(1));
    var p=PEOPLE[name];
    el.setAttribute('role','button');
    el.setAttribute('aria-label', name+' — '+p.quadrant+', distance '+p.distance.toFixed(3)+', rank '+p.rank+' of 32');
  });
}
layoutDots();

renderList();

// Report content height to the embedding parent so the iframe can size to
// content (no inner scrollbar). Panel height changes on hover/click detail.
// Measure #app directly, NOT documentElement.scrollHeight: scrollHeight is
// floored at the iframe's own viewport height, so once the parent sizes the
// frame it can never shrink back below that (leaving an empty strip). #app's
// bounding box is the true content height and can go below the current frame.
function postHeight() {
  const app = document.getElementById('app');
  if (!app) return;
  const h = Math.ceil(app.getBoundingClientRect().height);
  parent.postMessage({ type: 'neighbor-map-height', height: h }, '*');
}
window.addEventListener('load', postHeight);
window.addEventListener('resize', postHeight);
if (document.fonts && document.fonts.ready) document.fonts.ready.then(postHeight);
if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.getElementById('app'));
postHeight();
</script>
</body>
